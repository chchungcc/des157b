<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Video</title>

    <!-- normalization -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">

    <!-- style sheet -->
    <link href="styles.css" rel="stylesheet">

    <!-- javascript -->
     <script src="script.js" defer></script>
</head>

<body>
    <main>
        <div class="mainvideo">
            <div class="poem">
                <p class="line1">Slipping through my fingers</p>
                <p class="line2">all the time</p>
                <p class="line3">I try to capture every minute</p>
                <p class="line4">The feeling in it</p>
            </div>

            <div class="bubbles">
                <img src="media/bubble.png" alt="bubble" class="bubble1" width="100">
                <img src="media/bubble.png" alt="bubble" class="bubble2" width="80">
                <img src="media/bubble.png" alt="bubble" class="bubble3" width="50">
            </div>

            <video id="blockbuster" muted autoplay loop playsinline>
                <source src="media/blockbuster.webm" type="video/webm">
                <source src="media/blockbuster.mp4" type="video/mp4">

                <p>Your browser doesn't support HTML5 video. Here is a <a href="media/blockbuster.mp4">link</a> to the video instead.</p>
            </video>

            <img src="media/film-frame.png" alt="film frame" id="film">
        </div>
    </main>
    
</body>
</html>
